name: Close stale issues

on:
  schedule: # Run 5 minutes after midnight daily.
  - cron: '5 0 * * *'

permissions:
  contents: read

jobs:
  stale:

    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629
      with:
        start-date: '2022-03-01T00:00:00Z' # ISO 8601 or RFC 2822
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-stale: 180
        days-before-close: 14
        stale-issue-label: stale
        close-issue-message: >
            This issue has been automatically closed due to lack of activity.
            If you feel this issue is still important, please reopen it and leave a comment.
        exempt-issue-labels: 'breaking-change,Pri0,:watch: Not Triaged,'
        operations-per-run: 50
        debug-only: true
